name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  standalone:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: rayserve-test

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Update chart dependencies
        run: helm dependency update chart/

      - name: Install KubeRay operator (CRDs must exist before RayService)
        run: |
          helm install kuberay-operator chart/charts/kuberay-operator-*.tgz \
            --wait --timeout 3m

      - name: Install chart (standalone, no NebariApp)
        run: |
          helm install rayserve chart/ \
            --set kuberay-operator.enabled=false \
            --set nebariapp.enabled=false \
            --set head.resources.requests.cpu=500m \
            --set head.resources.requests.memory=512Mi \
            --set head.resources.limits.cpu=1 \
            --set head.resources.limits.memory=1Gi \
            --set worker.replicas=1 \
            --set worker.resources.requests.cpu=250m \
            --set worker.resources.requests.memory=512Mi \
            --set worker.resources.limits.cpu=500m \
            --set worker.resources.limits.memory=1Gi \
            --timeout 5m

      - name: Wait for Ray head pod
        run: |
          echo "Waiting for RayService to create pods..."
          for i in $(seq 1 60); do
            if kubectl get pod -l ray.io/node-type=head -o name 2>/dev/null | grep -q pod; then
              echo "Head pod found"
              break
            fi
            echo "  attempt $i/60..."
            sleep 5
          done
          kubectl wait --for=condition=ready pod -l ray.io/node-type=head --timeout=180s

      # Exercises the fix from #7: with default values (no Serve apps deployed),
      # the worker pod must reach Ready solely on raylet healthz. Before this
      # chart override, KubeRay's default probe also required a Serve healthz
      # response on localhost:8000, which never became available without an
      # explicitly deployed Serve application.
      - name: Wait for Ray worker pod
        run: |
          echo "Waiting for worker pod..."
          for i in $(seq 1 60); do
            if kubectl get pod -l ray.io/node-type=worker -o name 2>/dev/null | grep -q pod; then
              echo "Worker pod found"
              break
            fi
            echo "  attempt $i/60..."
            sleep 5
          done
          kubectl wait --for=condition=ready pod -l ray.io/node-type=worker --timeout=240s

      - name: Health check Ray Dashboard
        run: |
          kubectl port-forward svc/rayserve-nebari-rayserve-head-svc 8265:8265 &
          sleep 5
          curl -sf http://localhost:8265/api/version
          kill %1

      - name: Verify Ray cluster status
        run: |
          kubectl exec $(kubectl get pod -l ray.io/node-type=head -o name) -- \
            ray status

      - name: Debug info on failure
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -o wide || true
          echo ""
          echo "=== Services ==="
          kubectl get svc || true
          echo ""
          echo "=== RayService ==="
          kubectl get rayservice -o yaml || true
          echo ""
          echo "=== Pod logs (head) ==="
          kubectl logs -l ray.io/node-type=head --tail=50 || true
          echo ""
          echo "=== Events ==="
          kubectl get events --sort-by=.lastTimestamp | tail -30 || true
